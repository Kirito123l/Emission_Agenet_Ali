    tool_name: null
    arguments: {}
    guidance_utterance: "“先给我一个摘要” - 用结构化摘要快速查看当前结果"
    required_task_types:
      - macro_emission
    required_result_tokens:
      - emission
    requires_geometry_support: false
    requires_spatial_result_token: null
    provided_conflicts: []
    artifact_key: quick_summary_text
    alternative_action_ids: []
    guidance_enabled: true
    pre_execution_enabled: false
    category: delivery
