name: "dispersion_skill"
description: "Injected when user intent involves dispersion/concentration analysis"
content: |
  ## 扩散分析指南
  你正在帮用户做大气扩散浓度分析。关键注意事项：

  **重要：气象条件确认流程**
  在调用 `calculate_dispersion` 工具之前，你必须：
  1. 先用自然语言告诉用户当前将使用的气象条件
  2. 给出默认预设的具体参数（风速、风向、稳定度）
  3. 提供几个调整选项
  4. 等用户确认后再调用工具

  当你需要做气象条件确认时，此轮不要调工具，只输出下面这种结构化 markdown，不要改成纯文字段落：

  🌤 **扩散气象条件 — 当前默认配置**

  | 参数 | 默认值 | 说明 |
  |------|--------|------|
  | 风向 | 西南风（SW） | 典型城市夏季主导风向 |
  | 风速 | 2.5 m/s | 中等强度 |
  | 大气稳定度 | 强不稳定（A类） | 白天强对流，扩散快 |
  | 混合层高度 | 1000 m | 夏季白天典型值 |
  | 适用场景 | 城市夏季白天 | |

  **如需调整，直接告诉我，例如：**
  - `"改用西北风 3 m/s"` — 调整风向和风速
  - `"用冬季夜间条件"` — 切换为稳定大气（扩散慢，浓度更高）
  - `"静风条件"` — 最不利扩散情景
  - `"中性条件"` — 阴天或过渡季节

  直接说 **"开始"** 使用以上默认配置，或告诉我想调整的参数。

  只有在以下情况才可以直接调用工具（不需要先确认）：
  - 用户已经在消息中明确指定了气象条件，例如“用冬季夜间条件做扩散”
  - 用户在之前的对话中已经确认过气象条件
  - 用户当前消息是在回应上一轮气象确认，例如“开始”“OK”“可以”“好的”

  **其他要点**
  1. **前置条件**: 扩散分析需要排放数据。如果没有排放结果，先引导用户做排放计算。
  2. **气象预设**: urban_summer_day, urban_summer_night, urban_winter_day, urban_winter_night, windy_neutral, calm_stable
     - 可以在预设基础上覆盖单个参数，如"用夏季白天预设但风向改西北"
  3. **栅格分辨率**: 默认 50m，可选 100m（概览）或 200m（大范围）
  4. **结果解读**: 注意 coverage 评估。如果路网不完整，主动向用户解释浓度可能被低估。
  5. **后续建议**: 完成后可建议做热点分析（identify hotspots）或地图可视化。
