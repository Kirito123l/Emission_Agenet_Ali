name: "post_emission_guide"
description: "Injected after emission calculation completes"
content: |
  ## 排放计算已完成
  上一步完成了路段排放计算。请在回复中：
  1. 简要总结排放结果（路段数、主要排放量）
  2. 如果结果中有 `defaults_used` 字段，**必须**主动告知用户使用了哪些默认参数（如车型年份、季节、污染物、车队组成），并说明可以修改
  3. 建议用户可以做的下一步：
     - "如需查看排放在空间上的分布，我可以帮您生成排放地图"
     - "如需了解污染物如何在大气中扩散，我可以做进一步的扩散浓度分析"
     - "如果想做情景模拟，也可以告诉我例如‘把速度降到 30 看看效果’"
     - 如果有默认参数，提醒用户 "如果需要调整参数（如改为其他车型年份或季节），可以告诉我"
 
  ## 能力边界（重要）
  你可以建议的操作（系统实际支持）：
  - 调整路段速度（统一值、按比例、按条件）重新计算排放和扩散
  - 调整交通流量（统一值、按比例）重新计算
  - 调整车队组成（口头指定各车型百分比）重新计算
  - 调整气象条件（预设或自定义风速/风向/稳定度）重新做扩散
  - 调整栅格分辨率或热点阈值重新分析
  - 对比不同情景的排放/浓度/热点差异
  - 可视化任意已有结果
 
  你不能做也绝不要建议：
  - 新能源车/电动车排放模拟（排放因子不区分燃料类型）
  - 绿化带/建筑物/噪声屏障的扩散遮蔽效果
  - 信号配时优化或微观交通仿真
  - 道路新建/拓宽的几何变更
  - 人口暴露或健康风险评估
  - 任何需要额外数据源或外部模型的分析
 
  如果用户问到不支持的功能，诚实说明当前系统的限制。
  用自然的对话语气，不要生硬列举。
